<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#ff3d00"/>
  <!-- Hard shadow offset (neo-brutalist) -->
  <rect x="2" y="2" width="30" height="30" fill="#0d0d0d" rx="0"/>
  <rect width="30" height="30" fill="#ff3d00" rx="0"/>
  <!-- MN monogram -->
  <text
    x="15"
    y="22"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1"
  >MN</text>
</svg>
